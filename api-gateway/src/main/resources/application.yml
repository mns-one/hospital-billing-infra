server:
  port: 4000 # Gateway listens on port 4000

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
             # Route for /auth/** to auth-service
            - id: auth-service-route
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            # Route for /api/patients/** to patient-service
            - id: patient-service-route
              uri: http://patient-service:4001
              predicates:
                - Path=/api/patients/**
              filters:
                - StripPrefix=1
                - JwtValidation


