version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-service
    restart: on-failure:1  
    environment:
      SERVER_PORT: ${SERVER_PORT:-4001}
      GRPC_SERVER_PORT: ${GRPC_SERVER_PORT:-9001}
    ports:
      - "4001:4001"
      - "9001:9001"
    networks:
      - hospital

networks:
  hospital:
    external: true
      
