version: "3.9"

services:
  db:
    image: postgres:17
    container_name: patient-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patientdb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-patientdb}"]
      interval: 10s
      timeout: 5s
      retries: 1

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: patient-service
    restart: on-failure:1  
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/patientdb}
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DRIVER: ${DB_DRIVER:-org.postgresql.Driver}
      DB_PLATFORM: ${DB_PLATFORM:-org.hibernate.dialect.PostgreSQLDialect}
      BILLING_SERVICE_ADDRESS: ${BILLING_SERVICE_ADDRESS:-billing-service}
      BILLING_SERVICE_GRPC_PORT: ${BILLING_SERVICE_GRPC_PORT:-9001}
    ports:
      - "8080:8080"
    networks:
      - default
      - hospital

volumes:
  pgdata:

networks:
  hospital:
    external: true